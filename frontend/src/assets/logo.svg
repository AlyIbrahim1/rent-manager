<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 228 48" fill="none" role="img" aria-label="The Ledger">

  <style>
    .logo-mark {
      stroke: #1A1A2E;
    }

    .logo-wordmark {
      fill: #1A1A2E;
    }
  </style>

  <!-- Icon: 32×48 (preserves 100:150 aspect ratio of ledger-logo.svg) -->
  <svg x="0" y="0" width="32" height="48" viewBox="0 0 100 150">
    <g transform="translate(0, 15) skewY(-15)">
      <path d="
        M 10 130 H 90
        M 20 50 V 130
        M 40 30 V 130
        M 60 10 V 130
        M 80 10 V 130
        M 20 110 H 80
        M 20 90 H 80
        M 20 70 H 80
        M 20 50 H 80
        M 40 30 H 80
        M 60 10 H 80
      " class="logo-mark" stroke-width="9" stroke-linecap="square" fill="none"/>
    </g>
  </svg>

  <!-- Wordmark: vertically centered in 48px height (baseline at y=32) -->
  <text
    x="44"
    y="32"
    font-family="'Manrope', 'Inter', system-ui, sans-serif"
    font-weight="700"
    font-size="20"
    letter-spacing="0.35em"
    class="logo-wordmark"
  >THE LEDGER</text>

</svg>
