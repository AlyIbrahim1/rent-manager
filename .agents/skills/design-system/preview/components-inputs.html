<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  body { margin: 0; background: #f7f9fb; font-family: 'Inter', sans-serif; padding: 20px; display: flex; flex-direction: column; gap: 14px; max-width: 480px; }
  .card { background: #fff; border-radius: 6px; padding: 16px 20px; box-shadow: 0 12px 40px rgba(25,28,30,0.06); }
  .card-label { font-size: 10px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: #76777d; margin-bottom: 10px; }
  label { display: block; font-size: 11px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: #45464d; margin-bottom: 8px; }
  input { width: 100%; box-sizing: border-box; padding: 12px 16px; background: #e0e3e5; color: #191c1e; font-family: 'Inter', sans-serif; font-size: 14px; border: none; border-radius: 12px; outline: none; transition: background 200ms, box-shadow 200ms; }
  input::placeholder { color: #45464d; opacity: 0.55; }
  .focused { background: #fff !important; box-shadow: 0 0 0 2px rgba(15,23,42,0.15), inset 0 0 0 1px rgba(15,23,42,0.18) !important; }
  .note { font-size: 11px; color: #76777d; margin-top: 8px; }
  .icon-wrap { position: relative; }
  .icon-wrap svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #999; pointer-events: none; }
  .icon-wrap input { padding-left: 44px; }
</style>
</head>
<body>
  <div class="card">
    <div class="card-label">Default state</div>
    <label>Renter name</label>
    <input type="text" placeholder="e.g. Nadia Khalil" />
    <div class="note">bg: surface-highest (#e0e3e5) · no border · rounded-xl</div>
  </div>
  <div class="card">
    <div class="card-label">Focus state</div>
    <label>Monthly rent</label>
    <div class="icon-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
      <input type="text" value="1,850" class="focused" />
    </div>
    <div class="note">bg: white · ring: primary/15 · inset stroke: primary/18</div>
  </div>
  <div class="card">
    <div class="card-label">With icon prefix</div>
    <label>Email address</label>
    <div class="icon-wrap">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
      <input type="email" placeholder="manager@domain.com" style="border-radius:8px;background:#F5F5F5" />
    </div>
    <div class="note">Login page variant: rounded-[8px] · bg: #F5F5F5</div>
  </div>
  <div class="card">
    <div class="card-label">Search field</div>
    <div class="icon-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#45464d" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" placeholder="Search properties, tenants..." style="background:#eceef0;border-radius:4px" />
    </div>
    <div class="note">Header search: surface-container bg · rounded-sm</div>
  </div>
</body>
</html>
