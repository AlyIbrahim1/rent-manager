<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@700&display=swap" rel="stylesheet">
<style>
  body { margin: 0; background: #d0d2d4; font-family: 'Inter', sans-serif; padding: 24px; display: flex; flex-wrap: wrap; gap: 20px; align-items: flex-start; }
  .label { font-size: 10px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: #76777d; margin-bottom: 8px; }
  /* Modal shell */
  .modal { background: #fff; border-radius: 28px; overflow: hidden; width: 340px; box-shadow: 0 24px 48px -8px rgba(15,23,42,0.28), 0 8px 16px -4px rgba(15,23,42,0.12); }
  .modal-header { background: #f2f4f6; padding: 20px 24px; display: flex; align-items: flex-start; justify-content: space-between; }
  .modal-title { font-family: 'Manrope', sans-serif; font-size: 1.5rem; font-weight: 700; color: #191c1e; line-height: 1.1; }
  .modal-desc { font-size: 13px; color: #45464d; margin-top: 6px; line-height: 1.5; }
  .modal-close { width: 36px; height: 36px; border-radius: 12px; background: transparent; border: none; display: flex; align-items: center; justify-content: center; color: #45464d; cursor: pointer; }
  .modal-body { background: #f2f4f6; padding: 12px 12px; display: flex; flex-direction: column; gap: 10px; }
  .section-card { background: #fff; border-radius: 22px; padding: 18px 20px; box-shadow: 0 12px 40px rgba(25,28,30,0.06); }
  .section-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .section-icon { width: 36px; height: 36px; border-radius: 16px; background: #eceef0; display: flex; align-items: center; justify-content: center; color: #191c1e; flex-shrink: 0; }
  .section-title { font-family: 'Manrope', sans-serif; font-size: 1rem; font-weight: 700; color: #191c1e; }
  .section-sub { font-size: 12px; color: #45464d; margin-top: 2px; }
  .modal-footer { background: #f2f4f6; padding: 12px 16px; display: flex; justify-content: flex-end; gap: 8px; }
  .btn-cancel { padding: 9px 16px; background: #fff; color: #191c1e; font-size: 13px; font-weight: 600; border: none; border-radius: 4px; cursor: pointer; }
  .btn-save { padding: 9px 16px; background: linear-gradient(135deg, #0f172a, #131b2e); color: #fff; font-size: 13px; font-weight: 600; border: none; border-radius: 4px; cursor: pointer; }
</style>
</head>
<body>
  <div>
    <div class="label">Modal shell pattern</div>
    <div class="modal">
      <div class="modal-header">
        <div>
          <div class="modal-title">Add New Renter</div>
          <div class="modal-desc">Enter lease details and start tracking monthly payments.</div>
        </div>
        <button class="modal-close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="section-card">
          <div class="section-head">
            <div class="section-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
            </div>
            <div>
              <div class="section-title">Basic Information</div>
              <div class="section-sub">Assign renter and unit details.</div>
            </div>
          </div>
          <input type="text" placeholder="e.g. Nadia Khalil" style="width:100%;box-sizing:border-box;padding:10px 14px;background:#e0e3e5;border:none;border-radius:12px;font-size:13px;outline:none;color:#191c1e;font-family:'Inter',sans-serif" />
        </div>
        <div class="section-card">
          <div class="section-head">
            <div class="section-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            </div>
            <div>
              <div class="section-title">Payment Tracking</div>
              <div class="section-sub">Set the most recent paid month.</div>
            </div>
          </div>
          <input type="month" style="width:100%;box-sizing:border-box;padding:10px 14px;background:#e0e3e5;border:none;border-radius:12px;font-size:13px;outline:none;color:#191c1e;font-family:'Inter',sans-serif" />
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel">Cancel</button>
        <button class="btn-save">Save renter</button>
      </div>
    </div>
  </div>
</body>
</html>
