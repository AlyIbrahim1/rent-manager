<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@700&display=swap" rel="stylesheet">
<style>
  body { margin: 0; background: #eceef0; font-family: 'Inter', sans-serif; padding: 20px; display: flex; flex-wrap: wrap; gap: 14px; align-items: flex-start; }
  .renter-card { background: #fff; border-radius: 6px; padding: 20px; width: 220px; cursor: pointer; transition: transform 300ms, background 300ms; }
  .renter-card:hover { transform: scale(1.01); background: #fff; }
  .renter-card.selected { box-shadow: 0 12px 40px rgba(25,28,30,0.06); outline: 1px solid rgba(198,198,205,0.15); }
  .row-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 16px; }
  .apt-badge { display: inline-flex; align-items: center; background: #e6e8ea; padding: 4px 10px; border-radius: 4px; font-size: 11px; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; color: #191c1e; }
  .overdue-chip { display: inline-flex; align-items: center; gap: 5px; background: #ffe9ec; padding: 4px 10px; border-radius: 9999px; font-size: 10px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: #9f1239; }
  .renter-name { font-family: 'Manrope', sans-serif; font-size: 1.15rem; font-weight: 700; color: #191c1e; margin-bottom: 16px; line-height: 1.2; }
  .data-row { background: #f2f4f6; border-radius: 4px; padding: 12px; }
  .data-line { display: flex; justify-content: space-between; align-items: center; }
  .data-line + .data-line { margin-top: 8px; }
  .data-key { font-size: 10px; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; color: #45464d; }
  .data-val { font-size: 13px; font-weight: 500; color: #191c1e; }
  .data-val.overdue { font-family: 'Manrope', sans-serif; font-size: 15px; font-weight: 700; color: #be123c; }
  .data-key.overdue { color: #be123c; }
  .card-label { font-size: 10px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: #76777d; background: #f7f9fb; border-radius: 4px; padding: 3px 8px; margin-bottom: 8px; display: inline-block; }
  .col { display: flex; flex-direction: column; gap: 6px; }
</style>
</head>
<body>
  <div class="col">
    <div class="card-label">Default</div>
    <div class="renter-card">
      <div class="row-top"><span class="apt-badge">Apt #7</span></div>
      <div class="renter-name">Marcus Chen</div>
      <div class="data-row">
        <div class="data-line">
          <span class="data-key">Monthly rent</span>
          <span class="data-val">$2,200</span>
        </div>
      </div>
    </div>
  </div>
  <div class="col">
    <div class="card-label">Selected</div>
    <div class="renter-card selected">
      <div class="row-top"><span class="apt-badge">Apt #12</span></div>
      <div class="renter-name">Jordan Alcott</div>
      <div class="data-row">
        <div class="data-line">
          <span class="data-key">Monthly rent</span>
          <span class="data-val">$1,850</span>
        </div>
      </div>
    </div>
  </div>
  <div class="col">
    <div class="card-label">Overdue</div>
    <div class="renter-card">
      <div class="row-top">
        <span class="apt-badge">Apt #3</span>
        <span class="overdue-chip">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3"/><line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12.01" y1="17" y2="17"/></svg>
          Overdue
        </span>
      </div>
      <div class="renter-name">Priya Nair</div>
      <div class="data-row">
        <div class="data-line">
          <span class="data-key">Monthly rent</span>
          <span class="data-val">$1,650</span>
        </div>
        <div class="data-line">
          <span class="data-key overdue">Balance due</span>
          <span class="data-val overdue">$3,300</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
